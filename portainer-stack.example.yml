version: "3.7"
services:

## --------------------------- HUBLABEL DISPARADOR META --------------------------- ##

  disparador-meta:
    image: ghcr.io/victoreder/hublabel-disparador:latest

    environment:
      SUPABASE_URL: https://SEU-PROJETO.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: COLE_AQUI_SUA_SERVICE_ROLE_KEY
      META_GRAPH_API_VERSION: v25.0
      PORT: "3080"
      SEND_INTERVAL_MS: "2000"
      POLL_IDLE_MS: "2000"
      MAX_RETRIES: "3"
      NODE_ENV: production

    networks:
      - RedeVictor

    ## Descomente para expor o health check fora da rede
    #ports:
    #  - 3080:3080

    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

## --------------------------- HUBLABEL DISPARADOR EVOLUTION --------------------------- ##

  disparador-evolution:
    image: ghcr.io/victoreder/hublabel-disparador:latest
    command: ["node", "src/workers/evolution.js"]

    environment:
      SUPABASE_URL: https://SEU-PROJETO.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: COLE_AQUI_SUA_SERVICE_ROLE_KEY
      EVOLUTION_BASE_URL: https://evolution2.victoreder.com.br
      EVOLUTION_API_KEY: COLE_AQUI_SUA_APIKEY_EVOLUTION
      NODE_ENV: production

    networks:
      - RedeVictor

    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s

    healthcheck:
      disable: true

## --------------------------- HUBLABEL DISPARADOR INBOUND --------------------------- ##

  disparador-inbound:
    image: ghcr.io/victoreder/hublabel-disparador:latest
    command: ["node", "src/inbound.js"]

    environment:
      SUPABASE_URL: https://SEU-PROJETO.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: COLE_AQUI_SUA_SERVICE_ROLE_KEY
      META_GRAPH_API_VERSION: v25.0
      INBOUND_PORT: "3090"
      EVENTS_META_PATH: /backend/webhook-eventsmeta
      EVOLUTION_WEBHOOK_PATH: /agente-no-whatsapp
      AGENT_POLL_MS: "500"
      S3_ENDPOINT: https://s32.victoreder.com.br
      S3_ACCESS_KEY_ID: COLE_S3_ACCESS_KEY
      S3_SECRET_ACCESS_KEY: COLE_S3_SECRET_KEY
      S3_BUCKET: n8n
      S3_PUBLIC_BASE_URL: https://s32.victoreder.com.br/n8n
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      OPENAI_API_KEY: COLE_OPENAI_API_KEY
      REDIS_URL: redis://redis:6379
      CALCULAR_TOKEN_URL: https://webhook2.victoreder.com.br/webhook/calcular-token
      NODE_ENV: production

    networks:
      - RedeVictor

    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.docker.network=RedeVictor
        - traefik.http.routers.disparador_inbound_meta.rule=Host(`webhook2.victoreder.com.br`) && PathPrefix(`/backend/webhook-eventsmeta`)
        - traefik.http.routers.disparador_inbound_meta.entrypoints=websecure
        - traefik.http.routers.disparador_inbound_meta.priority=100
        - traefik.http.routers.disparador_inbound_meta.tls.certresolver=letsencryptresolver
        - traefik.http.routers.disparador_inbound_meta.service=disparador_inbound
        - traefik.http.routers.disparador_inbound_evo.rule=Host(`webhook2.victoreder.com.br`) && PathPrefix(`/agente-no-whatsapp`)
        - traefik.http.routers.disparador_inbound_evo.entrypoints=websecure
        - traefik.http.routers.disparador_inbound_evo.priority=100
        - traefik.http.routers.disparador_inbound_evo.tls.certresolver=letsencryptresolver
        - traefik.http.routers.disparador_inbound_evo.service=disparador_inbound
        - traefik.http.services.disparador_inbound.loadbalancer.server.port=3090
        - traefik.http.services.disparador_inbound.loadbalancer.passHostHeader=1

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

## --------------------------- NETWORKS --------------------------- ##

networks:
  RedeVictor:
    external: true
    name: RedeVictor